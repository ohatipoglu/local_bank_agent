<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Log Gözlem Ekranı</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Fira Code', monospace;
            background-color: #1e1e1e;
            color: #d4d4d4;
            margin: 0;
            padding: 20px;
        }

        h2 {
            color: #4fc3f7;
            text-align: center;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
        }

        .controls {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            align-items: center;
        }

        .refresh-btn {
            background-color: #4caf50;
            color: white;
            border: none;
            padding: 8px 16px;
            cursor: pointer;
            border-radius: 4px;
            font-family: inherit;
        }

        .refresh-btn:hover {
            background-color: #45a049;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        th, td {
            text-align: left;
            padding: 8px;
            border-bottom: 1px solid #333;
        }

        th {
            background-color: #2d2d2d;
            color: #9cdcfe;
            position: sticky;
            top: 0;
        }

        tr:hover {
            background-color: #2a2d2e;
        }

        /* Seviye Renkleri */
        .level-INFO { color: #6a9955; }
        .level-ERROR { color: #f44747; font-weight: bold; }
        .level-WARNING { color: #d7ba7d; }
        .level-DEBUG { color: #569cd6; }

        .session-col {
            color: #c586c0;
        }

        .module-col {
            color: #4ec9b0;
        }

        .message-col {
            word-break: break-all;
        }
    </style>
</head>
<body>

    <h2>📡 Sistem Log Gözlem Ekranı</h2>

    <div class="controls">
        <div>
            <label for="limitSelect">Gösterilecek Kayıt:</label>
            <select id="limitSelect" style="background:#333; color:white; border:1px solid #555; padding:4px;">
                <option value="50">50</option>
                <option value="100" selected>100</option>
                <option value="500">500</option>
                <option value="1000">1000</option>
            </select>
        </div>
        <button class="refresh-btn" onclick="fetchLogs()">🔄 Yenile</button>
    </div>

    <table>
        <thead>
            <tr>
                <th style="width: 180px;">Zaman</th>
                <th style="width: 80px;">Seviye</th>
                <th style="width: 100px;">Oturum ID</th>
                <th style="width: 200px;">Modül / Fonksiyon</th>
                <th>Mesaj</th>
            </tr>
        </thead>
        <tbody id="logTableBody">
            <!-- Loglar buraya JavaScript ile doldurulacak -->
        </tbody>
    </table>

    <script>
        async function fetchLogs() {
            const limit = document.getElementById("limitSelect").value;
            const tbody = document.getElementById("logTableBody");

            try {
                tbody.innerHTML = "<tr><td colspan='5' style='text-align:center;'>Yükleniyor...</td></tr>";
                const response = await fetch(`/api/logs?limit=${limit}`);
                const data = await response.json();

                if (data.status === "success") {
                    tbody.innerHTML = "";
                    data.logs.forEach(log => {
                        const row = document.createElement("tr");
                        row.innerHTML = `
                            <td>${log.timestamp}</td>
                            <td class="level-${log.level}">${log.level}</td>
                            <td class="session-col">[${log.session_id}]</td>
                            <td class="module-col">${log.module}:${log.function}:${log.line}</td>
                            <td class="message-col">${log.message}</td>
                        `;
                        tbody.appendChild(row);
                    });
                } else {
                    tbody.innerHTML = `<tr><td colspan='5' style='text-align:center; color:red;'>Hata: ${data.message}</td></tr>`;
                }
            } catch (error) {
                tbody.innerHTML = `<tr><td colspan='5' style='text-align:center; color:red;'>Bağlantı Hatası!</td></tr>`;
            }
        }

        // Sayfa yüklendiğinde otomatik çek
        window.onload = fetchLogs;

        // Dropdown değiştiğinde otomatik çek
        document.getElementById("limitSelect").addEventListener("change", fetchLogs);
    </script>
</body>
</html>
